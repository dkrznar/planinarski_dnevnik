<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %} Planinarski dnevnik {% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('izlet.izlet') }}">Planinarski dnevnik</a>
      <div class="ms-auto">
        <a href="{{ url_for('planina.planine')}}" class="btn btn-outline-light btn-sm me-2">Planine</a>
        <a href="{{ url_for('vrh.vrh')}}" class="btn btn-outline-light btn-sm me-2">Vrhovi</a>
        <a href="{{ url_for('izlet.izlet')}}" class="btn btn-outline-light btn-sm me-2">Izleti</a>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    {% block content %} 
    {% endblock %}
  </div>

  <footer class="footer">
    <small>© 2026 Planinarski dnevnik</small>
  </footer>
  {% block scripts %}
  {% endblock %}
  
</body>
</html>
