<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %} Planinarski dnevnik {% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css')}}" rel="stylesheet"/>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('izlet.izlet') }}">Planinarski dnevnik</a>
      <div class="ms-auto">
        <a href="{{ url_for('izlet.izlet')}}" class="btn btn-outline-light btn-sm me-2">Izleti</a>
        <a href="{{ url_for('izlet.novi_izlet')}}" class="btn btn-outline-light btn-sm me-2">Dodaj izlet</a>
        <a href="{{ url_for('izlet.grafikon')}}" class="btn btn-outline-light btn-sm me-2">Grafikon</a>
      </div>
    </div>
  </nav>

  <div class="container mt-4 main-content">
    {% block content %} 
    {% endblock %}
  </div>

  <footer class="footer mt-auto w-100">
    <small>© 2026 Planinarski dnevnik - Danijela Krznar</small>
  </footer>
  {% block scripts %}
  {% endblock %}
  
</body>
</html>
