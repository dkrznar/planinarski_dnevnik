{% extends "base.html" %}
{% block content %}
<h2>Grafički prikaz izleta po planinama</h2>

<div class="row">
  <div class="col-md-6">
    <canvas id="planinaGraf"></canvas>
  </div>
</div>
{% endblock %}

{% block scripts %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const ctx = document.getElementById('planinaGraf').getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: {{nazivi | tojson}},
      datasets: [{
        label: 'Broj izleta',
        data: {{brojevi | tojson}},
        backgroundColor: '#2d6a4f'
      }]
    },
    options: {
      scales: {
        y: {
          beginAtZero: true,
          ticks: {
            stepSize: 1
          }
        }
      }
    }
  });
</script>
{% endblock %}
